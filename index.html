<!DOCTYPE html>
<html>
<head>
    <title>Math Homework</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@900&display=swap" rel="stylesheet">
    <style>
        body {
            background: #000;
            margin: 0;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            font-family: 'Orbitron', sans-serif;
            user-select: none;
        }
        
        canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        #ui-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
        }

        #speed-box {
            position: absolute;
            top: 20px; left: 20px;
            font-size: 32px;
            color: #0ff;
            background: rgba(0, 255, 255, 0.1);
            padding: 10px 20px;
            border: 2px solid #0ff;
            transform: skew(-15deg);
            box-shadow: 0 0 15px #0ff;
            text-shadow: 0 0 5px #fff;
        }

        #score-box {
            position: absolute;
            top: 20px; right: 20px;
            text-align: right;
            transform: skew(15deg);
        }

        .score-panel {
            background: rgba(255, 0, 255, 0.1);
            border: 2px solid #f0f;
            padding: 10px 20px;
            margin-bottom: 5px;
            box-shadow: 0 0 15px #f0f;
        }

        #score-value {
            font-size: 32px;
            color: #f0f;
            text-shadow: 0 0 5px #fff;
        }

        #high-score {
            font-size: 14px;
            color: #aaa;
            letter-spacing: 2px;
        }

        #drift-indicator {
            position: absolute;
            top: 80px; left: 20px;
            font-size: 20px;
            color: #ff0055;
            background: rgba(50, 0, 20, 0.6);
            padding: 5px 15px;
            border: 2px solid #ff0055;
            transform: skew(-15deg);
            display: none; 
            text-shadow: 0 0 10px #ff0055;
            box-shadow: 0 0 20px rgba(255, 0, 85, 0.4);
            animation: pulse 0.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        #start-screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            z-index: 10;
            backdrop-filter: blur(5px);
        }
        
        h1 { 
            margin: 0; 
            font-size: 8vw; 
            color: #f0f; 
            text-shadow: 0 0 30px #f0f, 0 0 60px #f0f; 
            transform: skew(-10deg); 
            margin-bottom: 20px;
            animation: glow 2s ease-in-out infinite;
        }

        @keyframes glow {
            0%, 100% { text-shadow: 0 0 30px #f0f, 0 0 60px #f0f; }
            50% { text-shadow: 0 0 40px #f0f, 0 0 80px #f0f, 0 0 100px #f0f; }
        }
        
        .menu-title {
            font-size: 24px; 
            color: #0ff; 
            margin-bottom: 40px; 
            letter-spacing: 4px;
        }

        .btn-container {
            display: flex;
            gap: 30px;
        }

        .btn {
            font-family: 'Orbitron', sans-serif;
            font-size: 28px;
            padding: 20px 50px;
            border: 3px solid #fff;
            color: #fff;
            background: rgba(0,0,0,0.5);
            cursor: pointer;
            transform: skew(-15deg);
            transition: all 0.3s ease;
            text-shadow: 0 0 5px #fff;
            pointer-events: all;
        }

        .btn:hover {
            transform: skew(-15deg) scale(1.15) translateY(-5px);
        }

        .btn-easy { 
            border-color: #0f0; 
            color: #0f0; 
            box-shadow: 0 0 15px #0f0; 
        }
        
        .btn-normal { 
            border-color: #ff0; 
            color: #ff0; 
            box-shadow: 0 0 15px #ff0; 
        }

        .btn-easy:hover { 
            background: rgba(0, 255, 0, 0.3); 
            box-shadow: 0 0 30px #0f0;
        }
        
        .btn-normal:hover { 
            background: rgba(255, 255, 0, 0.3); 
            box-shadow: 0 0 30px #ff0;
        }
        
        #drift-popup {
            position: absolute;
            top: 20px; right: -400px;
            background: rgba(0, 0, 0, 0.9);
            border: 3px solid #ff0055;
            box-shadow: 0 0 40px rgba(255, 0, 85, 0.8);
            padding: 20px 25px;
            border-radius: 10px;
            z-index: 50;
            display: none;
            max-width: 350px;
            text-align: center;
            pointer-events: all;
            transition: right 0.5s ease-out;
        }
        
        #drift-popup.show {
            right: 20px;
        }
        
        #drift-popup h2 {
            color: #ff0055;
            font-size: 24px;
            margin: 0 0 15px 0;
            text-shadow: 0 0 20px #ff0055;
        }
        
        #drift-popup p {
            color: #fff;
            font-size: 18px;
            line-height: 1.6;
            margin-bottom: 25px;
        }
        
        #drift-popup .drift-key {
            display: inline-block;
            background: #333;
            border: 2px solid #fff;
            padding: 10px 20px;
            margin: 0 5px;
            border-radius: 5px;
            font-size: 20px;
            font-weight: bold;
        }
        
        #drift-popup .checkbox-container {
            margin: 20px 0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        
        #drift-popup input[type="checkbox"] {
            width: 20px;
            height: 20px;
            cursor: pointer;
        }
        
        #drift-popup label {
            color: #aaa;
            font-size: 14px;
            cursor: pointer;
        }
        
        #drift-popup button {
            font-family: 'Orbitron', sans-serif;
            font-size: 20px;
            padding: 15px 40px;
            border: 3px solid #ff0055;
            color: #fff;
            background: rgba(255, 0, 85, 0.2);
            cursor: pointer;
            transition: all 0.3s ease;
            text-shadow: 0 0 5px #fff;
        }
        
        #drift-popup button:hover {
            background: rgba(255, 0, 85, 0.5);
            box-shadow: 0 0 20px #ff0055;
            transform: scale(1.1);
        }
    </style>
</head>
<body>

    <canvas id="gameCanvas"></canvas>
    
    <div id="ui-layer">
        <div id="speed-box">0 <span style="font-size:16px">KM/H</span></div>
        
        <div id="score-box">
            <div class="score-panel">
                <div id="score-value">0</div>
                <div style="font-size:10px; color:#f0f">SCORE</div>
            </div>
            <div id="high-score">HIGH: 0</div>
        </div>

        <div id="drift-indicator">DRIFT BONUS X5!</div>
    </div>
    
    <div id="drift-popup">
        <h2>Press SPACE to Drift</h2>
        <div class="checkbox-container">
            <input type="checkbox" id="dont-show-again" onchange="handleDontShowAgain()">
            <label for="dont-show-again">Don't show again</label>
        </div>
    </div>

    <div id="start-screen">
        <h1>NEON VELOCITY</h1>
        
        <div class="menu-title" style="margin-bottom: 20px;">SELECT CAR COLOR</div>
        <div style="display: flex; gap: 15px; justify-content: center; margin-bottom: 40px; pointer-events: all;">
            <div class="color-box" data-color="red" onclick="selectCarColor('red')" style="width: 50px; height: 50px; background: linear-gradient(135deg, #ff0000, #aa0000); border: 3px solid #fff; cursor: pointer; box-shadow: 0 0 15px #ff0000; transition: transform 0.2s, border 0.2s;" onmouseover="if(this.dataset.color !== carColor) this.style.transform='scale(1.1)'" onmouseout="if(this.dataset.color !== carColor) this.style.transform='scale(1)'"></div>
            <div class="color-box" data-color="blue" onclick="selectCarColor('blue')" style="width: 50px; height: 50px; background: linear-gradient(135deg, #0088ff, #0044aa); border: 3px solid #fff; cursor: pointer; box-shadow: 0 0 15px #0088ff; transition: transform 0.2s, border 0.2s;" onmouseover="if(this.dataset.color !== carColor) this.style.transform='scale(1.1)'" onmouseout="if(this.dataset.color !== carColor) this.style.transform='scale(1)'"></div>
            <div class="color-box" data-color="green" onclick="selectCarColor('green')" style="width: 50px; height: 50px; background: linear-gradient(135deg, #00ff00, #00aa00); border: 3px solid #fff; cursor: pointer; box-shadow: 0 0 15px #00ff00; transition: transform 0.2s, border 0.2s;" onmouseover="if(this.dataset.color !== carColor) this.style.transform='scale(1.1)'" onmouseout="if(this.dataset.color !== carColor) this.style.transform='scale(1)'"></div>
            <div class="color-box" data-color="purple" onclick="selectCarColor('purple')" style="width: 50px; height: 50px; background: linear-gradient(135deg, #ff00ff, #aa00aa); border: 3px solid #fff; cursor: pointer; box-shadow: 0 0 15px #ff00ff; transition: transform 0.2s, border 0.2s;" onmouseover="if(this.dataset.color !== carColor) this.style.transform='scale(1.1)'" onmouseout="if(this.dataset.color !== carColor) this.style.transform='scale(1)'"></div>
            <div class="color-box" data-color="orange" onclick="selectCarColor('orange')" style="width: 50px; height: 50px; background: linear-gradient(135deg, #ff8800, #cc6600); border: 3px solid #fff; cursor: pointer; box-shadow: 0 0 15px #ff8800; transition: transform 0.2s, border 0.2s;" onmouseover="if(this.dataset.color !== carColor) this.style.transform='scale(1.1)'" onmouseout="if(this.dataset.color !== carColor) this.style.transform='scale(1)'"></div>
            <div class="color-box" data-color="cyan" onclick="selectCarColor('cyan')" style="width: 50px; height: 50px; background: linear-gradient(135deg, #00ffff, #00aaaa); border: 3px solid #fff; cursor: pointer; box-shadow: 0 0 15px #00ffff; transition: transform 0.2s, border 0.2s;" onmouseover="if(this.dataset.color !== carColor) this.style.transform='scale(1.1)'" onmouseout="if(this.dataset.color !== carColor) this.style.transform='scale(1)'"></div>
        </div>
        
        <div class="menu-title">SELECT DIFFICULTY</div>
        
        <div class="btn-container">
            <div class="btn btn-easy" onclick="startGame('easy')">EASY</div>
            <div class="btn btn-normal" onclick="startGame('normal')">NORMAL</div>
        </div>
        
        <div style="margin-top: 50px; font-size: 16px; color: #aaa;">
            ⬅️➡️ / A D Steer | ⬆️ / W Accelerate | ⬇️ / S Brake | SPACE Drift
        </div>
    </div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d', { alpha: false });
    const speedBox = document.getElementById('speed-box');
    const scoreValBox = document.getElementById('score-value');
    const highScoreBox = document.getElementById('high-score');
    const driftBox = document.getElementById('drift-indicator');
    const startScreen = document.getElementById('start-screen');
    const driftPopup = document.getElementById('drift-popup');

    let isPlaying = false;
    let width, height;

    function resize() {
        width = window.innerWidth;
        height = window.innerHeight;
        canvas.width = width;
        canvas.height = height;
    }
    window.addEventListener('resize', resize);
    resize(); 

    const ROAD_WIDTH = 2000;
    const SEGMENT_LENGTH = 200;
    const DRAW_DISTANCE = 400; 
    const FIELD_OF_VIEW = 100;
    const CAMERA_DEPTH = 1 / Math.tan((FIELD_OF_VIEW / 2) * Math.PI / 180);
    const CAMERA_HEIGHT = 1000; 
    
    const MAX_SPEED = 12000; 
    const ACCEL = MAX_SPEED / 50;      
    const BREAKING = -MAX_SPEED / 20;
    const DECEL = -MAX_SPEED / 150;
    const OFF_ROAD_DECEL = -MAX_SPEED / 10; 

    let position = 0;
    let playerX = 0;
    let speed = 0;
    let carAngle = 0; 
    let carTilt = 0;
    let carBounce = 0;
    let cameraBank = 0;
    let steeringInput = 0; // Gradual steering input
    let lateralVelocity = 0; // Sideways momentum
    let carColor = localStorage.getItem('neonRacerCarColor') || 'red'; // Selected car color
    let wheelRotation = 0; // Wheel animation
    let lines = [];
    let smokeParticles = [];
    let tireMarks = []; // Tire marks on road
    let score = 0;
    let highScore = localStorage.getItem('neonRacerHighScore') || 0;
    highScoreBox.innerText = "HIGH: " + Math.floor(highScore);
    
    const keys = { left: false, right: false, up: false, down: false, drift: false };

    window.addEventListener('keydown', (e) => {
        if (!isPlaying) return;
        switch(e.key) {
            case 'ArrowLeft':
            case 'a':
            case 'A':
                keys.left = true; break;
            case 'ArrowRight':
            case 'd':
            case 'D':
                keys.right = true; break;
            case 'ArrowUp':
            case 'w':
            case 'W':
                keys.up = true; break;
            case 'ArrowDown':
            case 's':
            case 'S':
                keys.down = true; break;
            case ' ': keys.drift = true; e.preventDefault(); break;
        }
    });

    window.addEventListener('keyup', (e) => {
        switch(e.key) {
            case 'ArrowLeft':
            case 'a':
            case 'A':
                keys.left = false; break;
            case 'ArrowRight':
            case 'd':
            case 'D':
                keys.right = false; break;
            case 'ArrowUp':
            case 'w':
            case 'W':
                keys.up = false; break;
            case 'ArrowDown':
            case 's':
            case 'S':
                keys.down = false; break;
            case ' ': keys.drift = false; e.preventDefault(); break;
        }
    });

    const SETTINGS = {
        easy:   { curveMax: 2,  bankMax: 0.08, hillMax: 15 },
        normal: { curveMax: 5,  bankMax: 0.25, hillMax: 40 }
    };

    function selectCarColor(color) {
        carColor = color;
        localStorage.setItem('neonRacerCarColor', color);
        // Update visual selection
        updateColorSelection();
    }

    function updateColorSelection() {
        const colorBoxes = document.querySelectorAll('.color-box');
        colorBoxes.forEach(box => {
            if (box.dataset.color === carColor) {
                box.style.border = '4px solid #fff';
                box.style.transform = 'scale(1.2)';
            } else {
                box.style.border = '3px solid #fff';
                box.style.transform = 'scale(1)';
            }
        });
    }

    // Initialize color selection on page load
    window.addEventListener('DOMContentLoaded', () => {
        updateColorSelection();
    });
    
    function handleDontShowAgain() {
        const dontShow = document.getElementById('dont-show-again').checked;
        if (dontShow) {
            localStorage.setItem('neonRacerHideDriftPopup', 'true');
            // Hide popup with slide-out animation
            driftPopup.classList.remove('show');
            setTimeout(() => {
                driftPopup.style.display = 'none';
            }, 500);
        }
    }

    function startGame(difficulty) {
        startScreen.style.display = 'none';
        lines = [];
        score = 0;
        speed = 0;
        playerX = 0;
        position = 0;
        cameraBank = 0;
        carAngle = 0;
        carTilt = 0;
        carBounce = 0;
        steeringInput = 0;
        lateralVelocity = 0;
        smokeParticles = [];
        tireMarks = [];
        buildTrack(SETTINGS[difficulty]);
        isPlaying = true;
        lastTime = performance.now();
        
        // Show drift popup after 2 seconds if user hasn't disabled it
        const hideDriftPopup = localStorage.getItem('neonRacerHideDriftPopup');
        if (hideDriftPopup !== 'true') {
            setTimeout(() => {
                if (isPlaying) {
                    driftPopup.style.display = 'block';
                    // Trigger slide-in animation
                    setTimeout(() => {
                        driftPopup.classList.add('show');
                    }, 10);
                    
                    // Auto-hide after 5 seconds if not checked
                    setTimeout(() => {
                        if (isPlaying && !document.getElementById('dont-show-again').checked) {
                            driftPopup.classList.remove('show');
                            setTimeout(() => {
                                driftPopup.style.display = 'none';
                            }, 500);
                        }
                    }, 5000);
                }
            }, 2000);
        }
        
        requestAnimationFrame(loop);
    }

    function addLine() {
        lines.push({
            x: 0, 
            y: (lines.length === 0) ? 0 : lines[lines.length-1].y, 
            z: lines.length * SEGMENT_LENGTH,
            curve: 0,
            bank: 0, 
            scale: 0, 
            screen: {x:0, y:0, w:0}
        });
    }

    function easeInOut(a, b, percent) {
        return a + (b - a) * ((-Math.cos(percent * Math.PI) / 2) + 0.5);
    }

    function addRoad(enter, hold, leave, curve, maxBank, deltaY) {
        let startY = lines.length > 0 ? lines[lines.length-1].y : 0;
        let endY = startY + (deltaY * SEGMENT_LENGTH);
        let total = enter + hold + leave;

        for(let n=0; n<enter; n++) { 
            addLine(); 
            let l = lines[lines.length-1];
            l.curve = easeInOut(0, curve, n/enter); 
            l.bank = easeInOut(0, maxBank, n/enter);
            l.y = easeInOut(startY, endY, n/total);
        }
        for(let n=0; n<hold; n++) { 
            addLine(); 
            let l = lines[lines.length-1];
            l.curve = curve; 
            l.bank = maxBank; 
            l.y = easeInOut(startY, endY, (enter+n)/total);
        }
        for(let n=0; n<leave; n++) { 
            addLine(); 
            let l = lines[lines.length-1];
            l.curve = easeInOut(curve, 0, n/leave); 
            l.bank = easeInOut(maxBank, 0, n/leave); 
            l.y = easeInOut(startY, endY, (enter+hold+n)/total);
        }
    }

    function buildTrack(config) {
        addRoad(50, 50, 50, 0, 0, 0);

        for(let i=0; i<100; i++) {
            let curve = (Math.random() * config.curveMax) + (config.curveMax/2); 
            if (Math.random() > 0.5) curve = -curve;
            let bank = (Math.random() * config.bankMax) * (curve > 0 ? 1 : -1); 
            let hill = (Math.random() * (config.hillMax * 2)) - config.hillMax; 
            let length = Math.floor(Math.random() * 40) + 40;

            if(Math.random() > 0.85) {
                curve = 0; 
                bank = 0;
            }
            addRoad(length, length, length, curve, bank, hill);
        }
        
        addRoad(50, 50, 50, 0, 0, -(lines[lines.length-1].y / SEGMENT_LENGTH));
        for(let i=0; i<200; i++) addLine(); 
    }

    function project(line, camX, camY, camZ) {
        line.scale = CAMERA_DEPTH / (line.z - camZ);
        line.screen.x = Math.round((1 + line.scale * (line.x - camX)) * width / 2);
        line.screen.y = Math.round((1 - line.scale * (line.y - camY)) * height / 2);
        line.screen.w = Math.round(line.scale * ROAD_WIDTH * width / 2);
    }

    function drawPoly(ctx, color, x1, y1, x2, y2, x3, y3, x4, y4) {
        ctx.fillStyle = color;
        ctx.beginPath();
        ctx.moveTo(x1, y1);
        ctx.lineTo(x2, y2);
        ctx.lineTo(x3, y3);
        ctx.lineTo(x4, y4);
        ctx.closePath();
        ctx.fill();
    }

    function update(dt) {
        position += speed * dt;
        let totalLen = lines.length * SEGMENT_LENGTH;
        while (position >= totalLen) position -= totalLen;
        while (position < 0) position += totalLen;

        let currentSeg = lines[Math.floor(position/SEGMENT_LENGTH) % lines.length];

        if (keys.up) speed += ACCEL * dt * 60;
        else if (keys.down) speed += BREAKING * dt * 60;
        else speed += DECEL * dt * 60;

        // Realistic steering input with gradual response
        let targetSteeringInput = 0;
        if (keys.left) targetSteeringInput = -1;
        else if (keys.right) targetSteeringInput = 1;
        
        // Smooth steering input (steering wheel doesn't turn instantly)
        let steeringResponse = 0.08; // How quickly steering responds
        steeringInput += (targetSteeringInput - steeringInput) * steeringResponse;
        
        // Calculate grip based on speed (less grip at higher speeds = understeer)
        let speedRatio = speed / MAX_SPEED;
        let gripFactor = 1.0;
        
        if (speedRatio > 0.7) {
            // Understeer at high speeds
            gripFactor = 1.0 - (speedRatio - 0.7) * 0.8;
        }
        
        let isDrifting = keys.drift && speed > 4000 && Math.abs(steeringInput) > 0.3;
        
        // Calculate turn rate based on speed and conditions
        let baseTurnRate = dt * 1.3;
        let turnMultiplier = 1.0;
        
        if (isDrifting) {
            // Drifting reduces grip but allows sharper turns
            gripFactor *= 0.4;
            turnMultiplier = 1.6;
            speed -= 25 * dt * 60; 
            driftBox.style.display = 'block';
            
            // Drift particles
            if (Math.random() > 0.6) {
                smokeParticles.push({
                    x: width/2 + (steeringInput < 0 ? 30 : -30) + (Math.random()*30-15), 
                    y: height * 0.75 + 30, 
                    vx: (Math.random() - 0.5) * 2,
                    vy: -Math.random() * 2 - 1,
                    size: Math.random() * 8 + 4, 
                    life: 1,
                    alpha: 0.8
                });
            }
            
            // Add tire marks on the road
            let currentSegIndex = Math.floor(position / SEGMENT_LENGTH) % lines.length;
            tireMarks.push({
                segmentIndex: currentSegIndex,
                offsetX: playerX,
                leftMark: true,
                life: 1.0
            });
            tireMarks.push({
                segmentIndex: currentSegIndex,
                offsetX: playerX,
                leftMark: false,
                life: 1.0
            });
        } else {
            driftBox.style.display = 'none';
            // Normal grip at lower speeds
            if (speedRatio < 0.3) turnMultiplier = 1.1;
        }
        
        // Apply steering force to lateral velocity (momentum-based)
        let steeringForce = steeringInput * baseTurnRate * turnMultiplier * gripFactor;
        lateralVelocity += steeringForce;
        
        // Lateral friction - reduces sideways momentum naturally
        let lateralFriction = isDrifting ? 0.88 : 0.80;
        lateralVelocity *= lateralFriction;
        
        // Apply lateral velocity to player position
        playerX += lateralVelocity;
        
        // Visual feedback
        let targetAngle = 0;
        let targetTilt = 0;
        
        if (Math.abs(steeringInput) > 0.1) {
            if (isDrifting) {
                targetAngle = steeringInput * 0.6;
                targetTilt = steeringInput * 0.2;
            } else {
                targetAngle = steeringInput * 0.12 * (1 + speedRatio * 0.3);
                targetTilt = steeringInput * 0.15;
            }
        }
        
        // Smooth visual transitions
        carAngle += (targetAngle - carAngle) * 0.15 * (dt * 60);
        carTilt += (targetTilt - carTilt) * 0.1 * (dt * 60);

        let centrifugal = (currentSeg.curve * (speed/MAX_SPEED)) * 0.8 * dt;
        playerX -= centrifugal;

        if (playerX > -1 && playerX < 1) {
            let increment = (speed * dt) * 0.1;
            if (isDrifting) increment *= 5;
            score += increment;
            
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('neonRacerHighScore', highScore);
            }
        }

        if ((playerX < -1 || playerX > 1)) {
            if (speed > 500) speed += OFF_ROAD_DECEL * dt * 60;
            score = 0; // Reset score when off track
        }

        playerX = Math.max(-3, Math.min(3, playerX));
        speed = Math.max(0, Math.min(speed, MAX_SPEED));

        let targetBank = -currentSeg.bank * 0.4; 
        cameraBank = cameraBank + (targetBank - cameraBank) * 0.06 * (dt * 60);

        carBounce = Math.sin(Date.now() / 80) * (speed/MAX_SPEED) * 3;
        
        // Update wheel rotation based on speed
        wheelRotation += (speed / MAX_SPEED) * dt * 30;

        for(let i=0; i<smokeParticles.length; i++) {
            let p = smokeParticles[i];
            p.x += p.vx;
            p.y += p.vy;
            p.vy += 0.1;
            p.size += 0.3;
            p.life -= 0.02;
            p.alpha = p.life * 0.6;
        }
        smokeParticles = smokeParticles.filter(p => p.life > 0);
        
        // Fade tire marks over time
        for(let mark of tireMarks) {
            mark.life -= 0.003; // Slow fade
        }
        tireMarks = tireMarks.filter(m => m.life > 0);
    }

    function render() {
        ctx.fillStyle = "#000"; 
        ctx.fillRect(0, 0, width, height);

        let startPos = position / SEGMENT_LENGTH;
        let index = Math.floor(startPos);
        let playerSeg = lines[index % lines.length];
        let camH = CAMERA_HEIGHT + playerSeg.y; 

        ctx.save();
        ctx.translate(width/2, height/2);
        
        let clampedBank = Math.max(-0.25, Math.min(0.25, cameraBank));
        ctx.rotate(clampedBank); 
        
        ctx.translate(-width/2, -height/2);

        let gradient = ctx.createLinearGradient(0, 0, 0, height/2);
        gradient.addColorStop(0, "#0a0a20");
        gradient.addColorStop(1, "#1a1a35");
        ctx.fillStyle = gradient;
        ctx.fillRect(-width*2, -height*2, width*5, height*2.5); 
        
        let groundGradient = ctx.createLinearGradient(0, height/2, 0, height);
        groundGradient.addColorStop(0, "#0f0f1a");
        groundGradient.addColorStop(1, "#050508");
        ctx.fillStyle = groundGradient;
        ctx.fillRect(-width*2, height/2, width*5, height*2.5); 
        
        let maxy = height;
        let x = 0;
        let dx = 0;

        for(let n=0; n<DRAW_DISTANCE; n++) {
            let i = (Math.floor(startPos) + n) % lines.length;
            let segment = lines[i];
            let nextSegment = lines[(i + 1) % lines.length];
            
            let looped = segment.z < position % (lines.length * SEGMENT_LENGTH);
            let segmentZ = segment.z - (looped ? lines.length * SEGMENT_LENGTH : 0);
            
            if (segmentZ < position - SEGMENT_LENGTH) continue;

            project(segment, playerX * ROAD_WIDTH - x, camH, position - (looped ? lines.length * SEGMENT_LENGTH : 0));
            project(nextSegment, playerX * ROAD_WIDTH - x - dx, camH, position - (looped ? lines.length * SEGMENT_LENGTH : 0)); 

            x += dx;
            dx += segment.curve;

            if (segment.screen.y >= maxy) continue;
            maxy = segment.screen.y;

            let y1_left  = segment.screen.y - (segment.screen.w * segment.bank);
            let y1_right = segment.screen.y + (segment.screen.w * segment.bank);
            let y2_left  = nextSegment.screen.y - (nextSegment.screen.w * nextSegment.bank);
            let y2_right = nextSegment.screen.y + (nextSegment.screen.w * nextSegment.bank);

            let x1_left = segment.screen.x - segment.screen.w;
            let x1_right = segment.screen.x + segment.screen.w;
            let x2_left = nextSegment.screen.x - nextSegment.screen.w;
            let x2_right = nextSegment.screen.x + nextSegment.screen.w;

            let isAlt = (Math.floor(startPos) + n) % 8 < 4;
            let roadColor = isAlt ? "#1e1e28" : "#242430";
            let curbColor = isAlt ? "#00ddff" : "#ff00dd"; 
            let grassColor = isAlt ? "#0c0c18" : "#0a0a12";

            drawPoly(ctx, grassColor, 0, y1_left, x1_left, y1_left, x2_left, y2_left, 0, y2_left);
            drawPoly(ctx, grassColor, x1_right, y1_right, width, y1_right, width, y2_right, x2_right, y2_right);
            drawPoly(ctx, roadColor, x1_left, y1_left, x1_right, y1_right, x2_right, y2_right, x2_left, y2_left);
            
            // Draw tire marks on this segment
            for(let mark of tireMarks) {
                if (mark.segmentIndex === i && mark.life > 0) {
                    // Calculate mark position with proper offset for left/right wheels
                    let wheelOffset = 0.18; // Distance from center to wheel
                    let xOffset = mark.leftMark ? -wheelOffset : wheelOffset;
                    let markScreenX = segment.screen.x + (mark.offsetX + xOffset) * segment.screen.w;
                    let nextMarkScreenX = nextSegment.screen.x + (mark.offsetX + xOffset) * nextSegment.screen.w;
                    
                    // Calculate Y positions
                    let markY1 = segment.screen.y;
                    let markY2 = nextSegment.screen.y;
                    
                    // Draw tire mark as a dark line
                    ctx.globalAlpha = mark.life * 0.9;
                    ctx.strokeStyle = '#000000';
                    ctx.lineWidth = Math.max(2.5, segment.screen.w * 0.018);
                    ctx.lineCap = 'round';
                    
                    ctx.beginPath();
                    ctx.moveTo(markScreenX, markY1);
                    ctx.lineTo(nextMarkScreenX, markY2);
                    ctx.stroke();
                    
                    ctx.globalAlpha = 1.0;
                    ctx.lineCap = 'butt';
                }
            }
            
            let w1 = segment.screen.w * 0.06;
            let w2 = nextSegment.screen.w * 0.06;
            
            drawPoly(ctx, curbColor, x1_left - w1, y1_left, x1_left, y1_left, x2_left, y2_left, x2_left - w2, y2_left);
            drawPoly(ctx, curbColor, x1_right, y1_right, x1_right + w1, y1_right, x2_right + w2, y2_right, x2_right, y2_right);
                      
            if (isAlt) {
                let lw1 = segment.screen.w * 0.025;
                let lw2 = nextSegment.screen.w * 0.025;
                let cy1 = (y1_left + y1_right) / 2;
                let cy2 = (y2_left + y2_right) / 2;
                drawPoly(ctx, "#ffffff", segment.screen.x - lw1, cy1, segment.screen.x + lw1, cy1, 
                                      nextSegment.screen.x + lw2, cy2, nextSegment.screen.x - lw2, cy2);
            }
        }

        ctx.restore();

        ctx.save();
        for(let p of smokeParticles) {
            ctx.globalAlpha = p.alpha;
            ctx.fillStyle = "#bbbbbb";
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
            ctx.fill();
        }
        ctx.globalAlpha = 1;
        ctx.restore();

        drawCar();

        speedBox.innerHTML = Math.floor(speed/100) + ' <span style="font-size:16px">KM/H</span>';
        scoreValBox.innerText = Math.floor(score);
        highScoreBox.innerText = "HIGH: " + Math.floor(highScore);
    }

    function drawCar() {
        const cx = width / 2;
        const cy = height * 0.75;

        // Get car color values
        let colors = {
            red: { main: ['#b30000', '#ff0000', '#ff2222'], dark: '#660000', light: 'rgba(255, 100, 100, 0.4)' },
            blue: { main: ['#004488', '#0088ff', '#44aaff'], dark: '#002244', light: 'rgba(100, 150, 255, 0.4)' },
            green: { main: ['#008800', '#00ff00', '#44ff44'], dark: '#004400', light: 'rgba(100, 255, 100, 0.4)' },
            purple: { main: ['#880088', '#ff00ff', '#ff44ff'], dark: '#440044', light: 'rgba(255, 100, 255, 0.4)' },
            orange: { main: ['#cc6600', '#ff8800', '#ffaa44'], dark: '#663300', light: 'rgba(255, 180, 100, 0.4)' },
            cyan: { main: ['#008888', '#00ffff', '#44ffff'], dark: '#004444', light: 'rgba(100, 255, 255, 0.4)' }
        };
        let currentColor = colors[carColor] || colors.red;

        ctx.save();
        ctx.translate(cx, cy + carBounce);
        ctx.scale(1.3, 1.3);
        
        ctx.rotate(carAngle);
        ctx.scale(1, 1 + carTilt * 0.3);

        // Draw wheels first (behind car)
        function drawWheel(x, y) {
            ctx.save();
            ctx.translate(x, y);
            ctx.rotate(wheelRotation);
            
            // Tire
            ctx.fillStyle = '#1a1a1a';
            ctx.beginPath();
            ctx.arc(0, 0, 6, 0, Math.PI*2);
            ctx.fill();
            
            // Rim
            ctx.fillStyle = '#888';
            ctx.beginPath();
            ctx.arc(0, 0, 4, 0, Math.PI*2);
            ctx.fill();
            
            // Spokes
            ctx.strokeStyle = '#aaa';
            ctx.lineWidth = 1;
            for(let i = 0; i < 5; i++) {
                let angle = (i / 5) * Math.PI * 2;
                ctx.beginPath();
                ctx.moveTo(0, 0);
                ctx.lineTo(Math.cos(angle) * 3, Math.sin(angle) * 3);
                ctx.stroke();
            }
            
            ctx.restore();
        }
        
        // Draw all 4 wheels
        drawWheel(-32, 10);
        drawWheel(32, 10);
        drawWheel(-32, -8);
        drawWheel(32, -8);

        // Enhanced shadow with gradient
        ctx.shadowColor = "rgba(0,0,0,0.8)";
        ctx.shadowBlur = 20;
        ctx.shadowOffsetY = 8;
        let shadowGradient = ctx.createRadialGradient(0, 22, 0, 0, 22, 55);
        shadowGradient.addColorStop(0, "rgba(0,0,0,0.7)");
        shadowGradient.addColorStop(1, "rgba(0,0,0,0)");
        ctx.fillStyle = shadowGradient;
        ctx.fillRect(-50, 18, 100, 12);
        ctx.shadowColor = "transparent";

        // Main body with metallic gradient (custom color)
        let bodyGradient = ctx.createLinearGradient(-40, 15, 40, 15);
        bodyGradient.addColorStop(0, currentColor.main[0]);
        bodyGradient.addColorStop(0.3, currentColor.main[1]);
        bodyGradient.addColorStop(0.5, currentColor.main[2]);
        bodyGradient.addColorStop(0.7, currentColor.main[1]);
        bodyGradient.addColorStop(1, currentColor.main[0]);
        ctx.fillStyle = bodyGradient;
        ctx.beginPath();
        ctx.moveTo(-38, 16);
        ctx.lineTo(38, 16);
        ctx.lineTo(36, -10);
        ctx.lineTo(-36, -10);
        ctx.closePath();
        ctx.fill();

        // Body outline for depth
        ctx.strokeStyle = currentColor.dark;
        ctx.lineWidth = 1.5;
        ctx.stroke();

        // Side panel highlights
        ctx.fillStyle = currentColor.light;
        ctx.beginPath();
        ctx.moveTo(-34, 14);
        ctx.lineTo(-30, 10);
        ctx.lineTo(-30, -6);
        ctx.lineTo(-34, -8);
        ctx.closePath();
        ctx.fill();
        ctx.beginPath();
        ctx.moveTo(34, 14);
        ctx.lineTo(30, 10);
        ctx.lineTo(30, -6);
        ctx.lineTo(34, -8);
        ctx.closePath();
        ctx.fill();

        // Spoiler
        ctx.fillStyle = currentColor.dark;
        ctx.fillRect(-38, 14, 76, 3);
        ctx.fillStyle = '#000';
        ctx.fillRect(-40, 16, 80, 2);

        // Hood with gradient
        let hoodGradient = ctx.createLinearGradient(0, -26, 0, -10);
        hoodGradient.addColorStop(0, currentColor.main[0]);
        hoodGradient.addColorStop(0.5, currentColor.main[1]);
        hoodGradient.addColorStop(1, currentColor.main[0]);
        ctx.fillStyle = hoodGradient;
        ctx.beginPath();
        ctx.moveTo(-34, -10);
        ctx.lineTo(34, -10);
        ctx.lineTo(26, -28);
        ctx.lineTo(-26, -28);
        ctx.closePath();
        ctx.fill();

        // Hood outline
        ctx.strokeStyle = currentColor.dark;
        ctx.lineWidth = 1.5;
        ctx.stroke();

        // Hood detail line
        ctx.strokeStyle = currentColor.main[2];
        ctx.lineWidth = 0.8;
        ctx.beginPath();
        ctx.moveTo(-28, -12);
        ctx.lineTo(28, -12);
        ctx.stroke();
        
        // Windshield with reflection
        let glassGradient = ctx.createLinearGradient(0, -24, 0, -12);
        glassGradient.addColorStop(0, "rgba(10, 10, 25, 0.95)");
        glassGradient.addColorStop(0.3, "rgba(30, 30, 50, 0.9)");
        glassGradient.addColorStop(1, "rgba(10, 10, 25, 0.7)");
        ctx.fillStyle = glassGradient;
        ctx.beginPath();
        ctx.moveTo(-28, -12);
        ctx.lineTo(28, -12);
        ctx.lineTo(22, -24);
        ctx.lineTo(-22, -24);
        ctx.closePath();
        ctx.fill();

        // Glass reflection highlights
        ctx.fillStyle = "rgba(255, 255, 255, 0.3)";
        ctx.fillRect(-22, -22, 12, 4);
        ctx.fillStyle = "rgba(100, 150, 255, 0.2)";
        ctx.fillRect(-18, -18, 8, 3);

        // Side mirrors
        ctx.fillStyle = currentColor.dark;
        ctx.fillRect(-38, -2, 4, 6);
        ctx.fillRect(34, -2, 4, 6);
        ctx.fillStyle = "rgba(50, 100, 150, 0.5)";
        ctx.fillRect(-37, -1, 2, 4);
        ctx.fillRect(35, -1, 2, 4);

        // Turn signals (blink when turning)
        let turnSignalActive = Math.floor(Date.now() / 300) % 2 === 0;
        if (keys.left && turnSignalActive) {
            ctx.shadowColor = "#ffaa00";
            ctx.shadowBlur = 15;
            ctx.fillStyle = "#ffaa00";
            ctx.fillRect(-38, -5, 3, 3);
            ctx.shadowBlur = 0;
        }
        if (keys.right && turnSignalActive) {
            ctx.shadowColor = "#ffaa00";
            ctx.shadowBlur = 15;
            ctx.fillStyle = "#ffaa00";
            ctx.fillRect(35, -5, 3, 3);
            ctx.shadowBlur = 0;
        }

        // Enhanced headlights with realistic glow
        ctx.shadowColor = "#ffee00";
        ctx.shadowBlur = 20;
        let headlightGradient = ctx.createRadialGradient(-30, 5, 0, -30, 5, 8);
        headlightGradient.addColorStop(0, "#ffffff");
        headlightGradient.addColorStop(0.4, "#ffff88");
        headlightGradient.addColorStop(1, "#ffcc00");
        ctx.fillStyle = headlightGradient;
        ctx.fillRect(-36, 1, 16, 10);
        
        headlightGradient = ctx.createRadialGradient(30, 5, 0, 30, 5, 8);
        headlightGradient.addColorStop(0, "#ffffff");
        headlightGradient.addColorStop(0.4, "#ffff88");
        headlightGradient.addColorStop(1, "#ffcc00");
        ctx.fillStyle = headlightGradient;
        ctx.fillRect(20, 1, 16, 10);

        // Headlight details
        ctx.shadowBlur = 0;
        ctx.fillStyle = "rgba(255, 255, 255, 0.8)";
        ctx.fillRect(-34, 3, 4, 3);
        ctx.fillRect(30, 3, 4, 3);
        
        // Brake lights (glow brighter when braking)
        let brakeIntensity = keys.down ? 1.0 : 0.5;
        ctx.shadowColor = "#ff0000";
        ctx.shadowBlur = keys.down ? 25 : 12;
        let taillightGradient = ctx.createRadialGradient(-29, 13, 0, -29, 13, 5);
        taillightGradient.addColorStop(0, keys.down ? "#ffcccc" : "#ff6666");
        taillightGradient.addColorStop(0.5, "#ff0000");
        taillightGradient.addColorStop(1, "#aa0000");
        ctx.fillStyle = taillightGradient;
        ctx.globalAlpha = brakeIntensity;
        ctx.fillRect(-36, 11, 12, 5);
        
        taillightGradient = ctx.createRadialGradient(29, 13, 0, 29, 13, 5);
        taillightGradient.addColorStop(0, keys.down ? "#ffcccc" : "#ff6666");
        taillightGradient.addColorStop(0.5, "#ff0000");
        taillightGradient.addColorStop(1, "#aa0000");
        ctx.fillStyle = taillightGradient;
        ctx.fillRect(24, 11, 12, 5);
        ctx.globalAlpha = 1.0;

        ctx.shadowBlur = 0;

        // Exhaust pipes
        ctx.fillStyle = "#222";
        ctx.beginPath();
        ctx.arc(-30, 18, 3, 0, Math.PI*2);
        ctx.arc(30, 18, 3, 0, Math.PI*2);
        ctx.fill();
        ctx.strokeStyle = "#444";
        ctx.lineWidth = 1;
        ctx.stroke();
        
        // Enhanced exhaust flames at high speed
        if (speed > 8000) {
            let flameSize = 5 + Math.random() * 4;
            let innerFlameSize = flameSize * 0.6;
            
            // Outer glow
            let flameGradient = ctx.createRadialGradient(-30, 18, 0, -30, 18, flameSize * 2);
            flameGradient.addColorStop(0, "#00ffff");
            flameGradient.addColorStop(0.3, "rgba(0, 255, 255, 0.6)");
            flameGradient.addColorStop(1, "rgba(0, 255, 255, 0)");
            ctx.fillStyle = flameGradient;
            ctx.shadowColor = "#00ffff";
            ctx.shadowBlur = 25;
            ctx.beginPath();
            ctx.arc(-30, 18, flameSize * 1.5, 0, Math.PI*2);
            ctx.arc(30, 18, flameSize * 1.5, 0, Math.PI*2);
            ctx.fill();
            
            // Inner flame
            ctx.fillStyle = "#00ffff";
            ctx.shadowBlur = 15;
            ctx.beginPath();
            ctx.arc(-30, 18, flameSize, 0, Math.PI*2);
            ctx.arc(30, 18, flameSize, 0, Math.PI*2);
            ctx.fill();
            
            // Core
            ctx.fillStyle = "#ffffff";
            ctx.shadowBlur = 8;
            ctx.beginPath();
            ctx.arc(-30, 18, innerFlameSize, 0, Math.PI*2);
            ctx.arc(30, 18, innerFlameSize, 0, Math.PI*2);
            ctx.fill();
        }

        ctx.shadowColor = "transparent";
        ctx.shadowBlur = 0;
        ctx.restore();
    }

    let lastTime = 0;
    function loop(time) {
        if(!isPlaying) return;
        
        let dt = Math.min((time - lastTime) / 1000, 0.1);
        if (dt <= 0) dt = 1/60;
        lastTime = time;

        update(dt);
        render();
        requestAnimationFrame(loop);
    }

</script>
</body>
